<body data-page="shindan">

  <!-- Navigation -->
  <nav class="nav" role="navigation" aria-label="メインナビゲーション">
    <div class="container nav-container">
      <a href="/" class="nav__brand">
        <img src="assets/images/logo-icon.png" alt="名前診断ロゴ" class="nav__logo">
        <span class="nav__title">名前診断</span>
      </a>
      <ul class="nav__links">
        <li><a href="/" class="nav__link">ホーム</a></li>
        <li><a href="/shindan" class="nav__link nav__link--active">姓名判断</a></li>
        <li><a href="/about" class="nav__link">五格について</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="section shindan-main">
    <div class="container">

      <!-- Page Header -->
      <div class="page-header">
        <img src="assets/images/shindan-header.png" alt="" class="page-header__illustration" loading="lazy" width="300" height="150">
        <h1 class="page-title">姓名判断</h1>
        <p class="page-subtitle">姓と名を入力して五格の運勢を診断しましょう</p>
      </div>

      <!-- Shindan Form -->
      <form id="shindan-form" class="shindan-form card" novalidate>
        <div class="name-input-group">
          <div class="input-group">
            <label for="sei-input" class="input-label">姓（みょうじ）</label>
            <input
              type="text"
              id="sei-input"
              class="input-field"
              placeholder="山田"
              autocomplete="off"
              inputmode="text"
              maxlength="10"
              required
            >
            <div id="sei-stroke-preview" class="stroke-preview" aria-live="polite"></div>
          </div>
          <div class="input-group">
            <label for="mei-input" class="input-label">名（なまえ）</label>
            <input
              type="text"
              id="mei-input"
              class="input-field"
              placeholder="太郎"
              autocomplete="off"
              inputmode="text"
              maxlength="10"
              required
            >
            <div id="mei-stroke-preview" class="stroke-preview" aria-live="polite"></div>
          </div>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="error-message" aria-live="assertive"></div>

        <!-- Submit -->
        <button type="submit" id="submit-btn" class="btn btn--primary btn--lg btn--block">
          診断する
        </button>
      </form>

      <!-- Results Section (hidden by default) -->
      <section id="result-section" class="result-section" aria-label="診断結果">
        <div class="result-header">
          <h2 class="result-title">診断結果</h2>
          <p class="result-name-display">
            <span id="result-name" class="result-name-text"></span>
            さんの五格
          </p>
        </div>

        <!-- Gokaku Grid -->
        <div id="gokaku-grid" class="gokaku-grid"></div>

        <!-- Share -->
        <div class="share-section">
          <p class="share-section__label">診断結果をシェア</p>
          <div class="share-section__buttons">
            <a id="share-x" class="share-btn share-btn--x" href="#" target="_blank" rel="noopener noreferrer">
              <svg class="share-btn__icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              <span class="share-btn__text">X</span>
            </a>
            <a id="share-line" class="share-btn share-btn--line" href="#" target="_blank" rel="noopener noreferrer">
              <svg class="share-btn__icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.271.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
              <span class="share-btn__text">LINE</span>
            </a>
            <a id="share-facebook" class="share-btn share-btn--facebook" href="#" target="_blank" rel="noopener noreferrer">
              <svg class="share-btn__icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
              <span class="share-btn__text">Facebook</span>
            </a>
          </div>
        </div>

        <!-- Retry -->
        <div class="result-actions">
          <button id="retry-btn" class="btn btn--secondary">
            もう一度診断する
          </button>
          <a href="/about" class="btn btn--outline">
            五格について詳しく
          </a>
        </div>

        <!-- Disclaimer -->
        <div class="result-disclaimer">
          <p>※ 姓名判断は古くから伝わる占いの一種です。科学的根拠に基づくものではなく、あくまで参考情報としてお楽しみください。</p>
        </div>
      </section>

    </div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      regs.forEach(function(r) { r.unregister(); });
    });
    if (caches) {
      caches.keys().then(function(names) {
        names.forEach(function(n) { caches.delete(n); });
      });
    }
  }
