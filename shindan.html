<body data-page="shindan">

  <!-- Navigation -->
  <nav class="nav" role="navigation" aria-label="メインナビゲーション">
    <div class="container nav-container">
      <a href="index.html" class="nav__brand">
        <img src="assets/images/logo-icon.png" alt="名前診断ロゴ" class="nav__logo">
        <span class="nav__title">名前診断</span>
      </a>
      <ul class="nav__links">
        <li><a href="index.html" class="nav__link">ホーム</a></li>
        <li><a href="shindan.html" class="nav__link nav__link--active">姓名判断</a></li>
        <li><a href="about.html" class="nav__link">五格について</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="section shindan-main">
    <div class="container">

      <!-- Page Header -->
      <div class="page-header">
        <img src="assets/images/shindan-header.png" alt="" class="page-header__illustration" loading="lazy" width="300" height="150">
        <h1 class="page-title">姓名判断</h1>
        <p class="page-subtitle">姓と名を入力して五格の運勢を診断しましょう</p>
      </div>

      <!-- Shindan Form -->
      <form id="shindan-form" class="shindan-form card" novalidate>
        <div class="name-input-group">
          <div class="input-group">
            <label for="sei-input" class="input-label">姓（みょうじ）</label>
            <input
              type="text"
              id="sei-input"
              class="input-field"
              placeholder="山田"
              autocomplete="off"
              inputmode="text"
              maxlength="10"
              required
            >
            <div id="sei-stroke-preview" class="stroke-preview" aria-live="polite"></div>
          </div>
          <div class="input-group">
            <label for="mei-input" class="input-label">名（なまえ）</label>
            <input
              type="text"
              id="mei-input"
              class="input-field"
              placeholder="太郎"
              autocomplete="off"
              inputmode="text"
              maxlength="10"
              required
            >
            <div id="mei-stroke-preview" class="stroke-preview" aria-live="polite"></div>
          </div>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="error-message" aria-live="assertive"></div>

        <!-- Submit -->
        <button type="submit" id="submit-btn" class="btn btn--primary btn--lg btn--block">
          診断する
        </button>
      </form>

      <!-- Results Section (hidden by default) -->
      <section id="result-section" class="result-section" aria-label="診断結果">
        <div class="result-header">
          <h2 class="result-title">診断結果</h2>
          <p class="result-name-display">
            <span id="result-name" class="result-name-text"></span>
            さんの五格
          </p>
        </div>

        <!-- Gokaku Grid -->
        <div id="gokaku-grid" class="gokaku-grid"></div>

        <!-- Retry -->
        <div class="result-actions">
          <button id="retry-btn" class="btn btn--secondary">
            もう一度診断する
          </button>
          <a href="about.html" class="btn btn--outline">
            五格について詳しく
          </a>
        </div>

        <!-- Disclaimer -->
        <div class="result-disclaimer">
          <p>※ 姓名判断は古くから伝わる占いの一種です。科学的根拠に基づくものではなく、あくまで参考情報としてお楽しみください。</p>
        </div>
      </section>

    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">

        <span class="footer__brand-name">🌸 赤ちゃん名前診断</span>

        </ul>
      </nav>
      <p class="footer__copyright">&copy; 2026 赤ちゃん名前診断</p>
    </div>
  </footer>

  <script src="js/kanji-strokes.js?v=20260318f"></script>

  <script src="js/fortune-data.js?v=20260318f"></script>
  <script src="js/ui-controller.js?v=20260318f"></script>
  <script src="js/app.js?v=20260318f"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      regs.forEach(function(r) { r.unregister(); });
    });
    if (caches) {
      caches.keys().then(function(names) {
        names.forEach(function(n) { caches.delete(n); });
      });
    }
  }
</script>
<script>
// === DEBUG PANEL === (問題特定後に削除)
(function() {
  var panel = document.createElement('div');
  panel.id = 'dbg';
  panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.85);color:#0f0;font:11px/1.4 monospace;padding:6px 8px;z-index:99999;max-height:40vh;overflow-y:auto;pointer-events:none;';
  document.body.appendChild(panel);

  var maxDoc = 0;
  var maxBody = 0;
  var log = [];

  function measure() {
    var dw = document.documentElement.scrollWidth;
    var bw = document.body.scrollWidth;
    var vw = window.innerWidth;

    if (dw > maxDoc) maxDoc = dw;
    if (bw > maxBody) maxBody = bw;

    var overflow = (dw > vw || bw > vw) ? ' ⚠️OVERFLOW!' : ' ✅OK';

    var html = '<b>viewport:</b> ' + vw + 'px' + overflow + '<br>';
    html += '<b>doc.scrollW:</b> ' + dw + ' (max:' + maxDoc + ')<br>';
    html += '<b>body.scrollW:</b> ' + bw + ' (max:' + maxBody + ')<br>';

    var grid = document.getElementById('gokaku-grid');
    if (grid) {
      html += '<b>grid:</b> offset=' + grid.offsetWidth + ' scroll=' + grid.scrollWidth + '<br>';
      var cards = grid.querySelectorAll('.gokaku-card');
      cards.forEach(function(c, i) {
        var over = c.scrollWidth > c.offsetWidth ? ' ⚠️' : '';
        html += 'card' + i + ': off=' + c.offsetWidth + ' scr=' + c.scrollWidth + over + '<br>';
      });
      // Check dividers too
      var dividers = grid.querySelectorAll('.gokaku-divider');
      dividers.forEach(function(d, i) {
        var over = d.scrollWidth > d.offsetWidth ? ' ⚠️' : '';
        html += 'div' + i + ': off=' + d.offsetWidth + ' scr=' + d.scrollWidth + over + '<br>';
      });
    }

    var rs = document.getElementById('result-section');
    if (rs) {
      html += '<b>result-section:</b> off=' + rs.offsetWidth + ' scr=' + rs.scrollWidth + '<br>';
    }

    // Show last 3 log entries
    if (log.length > 0) {
      html += '<b>--- events ---</b><br>';
      log.slice(-3).forEach(function(l) { html += l + '<br>'; });
    }

    panel.innerHTML = html;
  }

  // Track scroll
  var scrollCount = 0;
  window.addEventListener('scroll', function() {
    scrollCount++;
    if (scrollCount % 5 === 0) {
      var dw = document.documentElement.scrollWidth;
      var vw = window.innerWidth;
      if (dw > vw) {
        log.push('scroll#' + scrollCount + ': OVERFLOW doc=' + dw + ' vw=' + vw);
      }
    }
    measure();
  }, { passive: true });

  // Track resize (iOS address bar)
  window.addEventListener('resize', function() {
    log.push('resize: ' + window.innerWidth + 'x' + window.innerHeight);
    measure();
  });

  // Periodic check
  setInterval(measure, 500);

  // Initial
  setTimeout(measure, 1000);
})();
</script>
</body>
</html>
